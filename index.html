<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta
      name="description"
      content="ChordBlocks — create and manage chord progressions"
    />
    <title>ChordBlocks</title>
    <script>
      try {
        if (localStorage.getItem("chordblocks:theme") === "light") {
          document.documentElement.dataset.theme = "light"
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute("content", "#eef1f5")
        }
      } catch (error) {
        /* ignore */
      }
    </script>
    <link href="/src/style.css" rel="stylesheet" />
  </head>
  <body
    class="bg-[url('/assets/bg2.jpg')] bg-cover bg-top text-gray-400 relative"
  >
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
